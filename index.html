<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soda Bet Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .header, .card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 1px 8px rgba(15, 23, 42, 0.06);
    }
    .header {
      padding: 24px;
      margin-bottom: 20px;
      display: flex;
      gap: 16px;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .title {
      margin: 0 0 8px;
      font-size: 32px;
      font-weight: 800;
    }
    .subtitle {
      margin: 0;
      color: #475569;
      font-size: 14px;
    }
    .players-pill {
      background: #f8fafc;
      padding: 12px 16px;
      border-radius: 18px;
      color: #334155;
      font-size: 14px;
    }
    .dashboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }
    .card {
      padding: 20px;
    }
    .card h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    .big-number {
      font-size: 32px;
      font-weight: 800;
      margin: 0;
    }
    .muted {
      color: #64748b;
      font-size: 14px;
    }
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1.3fr;
      gap: 20px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    input, select, button {
      width: 100%;
      font: inherit;
    }
    input, select {
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      padding: 12px 14px;
      background: white;
      color: #0f172a;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .span-2 {
      grid-column: span 2;
    }
    .button {
      border: none;
      border-radius: 16px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      background: #0f172a;
      color: white;
    }
    .button.secondary {
      background: white;
      color: #0f172a;
      border: 1px solid #cbd5e1;
    }
    .button.ghost {
      background: transparent;
      color: #475569;
      border: 1px solid #e2e8f0;
      width: auto;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 13px;
    }
    .button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
      background: #f1f5f9;
      padding: 6px;
      border-radius: 16px;
    }
    .tab-btn {
      border: none;
      background: transparent;
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      color: #475569;
    }
    .tab-btn.active {
      background: white;
      color: #0f172a;
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.08);
    }
    .bet-item {
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .bet-top {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: flex-start;
    }
    .bet-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }
    .badge {
      display: inline-block;
      background: #e2e8f0;
      color: #0f172a;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      margin-left: 8px;
    }
    .badge.settled { background: #dbeafe; }
    .badge.reset { background: #ede9fe; }
    .bet-meta {
      margin-top: 10px;
      font-size: 14px;
    }
    .bet-time {
      margin-top: 10px;
      font-size: 12px;
      color: #64748b;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .empty {
      border: 1px dashed #cbd5e1;
      border-radius: 18px;
      padding: 30px;
      text-align: center;
      color: #64748b;
      font-size: 14px;
    }
    .error {
      color: #dc2626;
      font-size: 14px;
      margin-top: 6px;
    }
    .status {
      margin-top: 10px;
      font-size: 13px;
      color: #475569;
    }
    @media (max-width: 900px) {
      .dashboard, .main-grid, .form-grid {
        grid-template-columns: 1fr;
      }
      .span-2 {
        grid-column: span 1;
      }
      .actions {
        grid-template-columns: 1fr;
      }
      .title {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1 class="title">Soda Bet Tracker</h1>
        <p class="subtitle">Track active bets, settle results, and see who owes who sodas overall.</p>
      </div>
      <div class="players-pill"><strong>Players:</strong> Madan vs Pali</div>
    </div>

    <div class="dashboard">
      <div class="card">
        <h3>Balance</h3>
        <p class="big-number" id="balanceText">Loading...</p>
        <p class="muted" id="balanceSummary">Please wait...</p>
        <div style="margin-top: 14px;">
          <button class="button" id="settleScoreBtn">Score settled</button>
        </div>
      </div>

      <div class="card">
        <h3>Madan won</h3>
        <p class="big-number" id="madanWon">0</p>
        <p class="muted">total sodas</p>
      </div>

      <div class="card">
        <h3>Pali won</h3>
        <p class="big-number" id="paliWon">0</p>
        <p class="muted">total sodas</p>
      </div>
    </div>

    <div class="main-grid">
      <div class="card">
        <h3 style="font-size: 22px; margin-bottom: 18px;">New Bet</h3>

        <div class="form-grid">
          <div class="span-2">
            <label for="match">Match / Event</label>
            <input id="match" placeholder="e.g. Team Liquid vs Fnatic" />
          </div>

          <div>
            <label for="teamA">Team 1</label>
            <input id="teamA" placeholder="First team" />
          </div>

          <div>
            <label for="teamB">Team 2</label>
            <input id="teamB" placeholder="Second team" />
          </div>

          <div>
            <label for="madanChoice">Madan bets on</label>
            <select id="madanChoice">
              <option value="">Select team</option>
            </select>
          </div>

          <div>
            <label for="paliChoice">Pali bets on</label>
            <select id="paliChoice">
              <option value="">Select team</option>
            </select>
          </div>

          <div class="span-2">
            <label for="sodas">How many sodas?</label>
            <input id="sodas" type="number" min="1" value="1" />
          </div>
        </div>

        <p class="error" id="formError" style="display:none;"></p>
        <p class="status" id="appStatus"></p>

        <div style="margin-top:16px;">
          <button class="button" id="createBetBtn">Create Bet</button>
        </div>
      </div>

      <div class="card">
        <h3 style="font-size: 22px; margin-bottom: 18px;">Bet Center</h3>

        <div class="tabs">
          <button class="tab-btn active" id="activeTabBtn">Active Bets</button>
          <button class="tab-btn" id="historyTabBtn">History</button>
        </div>

        <div id="activeTab"></div>
        <div id="historyTab" style="display:none;"></div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://pzsqwqrmvtelymriullt.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6c3F3cXJtdnRlbHltcml1bGx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MDM4NTMsImV4cCI6MjA4OTE3OTg1M30.MQfEYvw047ciqIOIurOOeWOojh81Du2NdIgGRsIuEj8";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const players = {
      playerA: "Madan",
      playerB: "Pali"
    };

    let bets = [];
    let balanceAdjustments = [];

    function formatDate(value) {
      if (!value) return "—";
      return new Date(value).toLocaleString();
    }

    function setStatus(text) {
      document.getElementById("appStatus").textContent = text || "";
    }

    function showError(message) {
      const error = document.getElementById("formError");
      error.textContent = message;
      error.style.display = "block";
    }

    function hideError() {
      const error = document.getElementById("formError");
      error.textContent = "";
      error.style.display = "none";
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getActiveBets() {
      return bets.filter(bet => bet.status === "open");
    }

    function getSettledBets() {
      return bets.filter(bet => bet.status === "settled");
    }

    function getScoreboard() {
      const settledBets = getSettledBets();
      let aWon = 0;
      let bWon = 0;

      for (const bet of settledBets) {
        if (bet.winner === "playerA") aWon += Number(bet.sodas || 0);
        if (bet.winner === "playerB") bWon += Number(bet.sodas || 0);
      }

      let net = aWon - bWon;

      for (const adjustment of balanceAdjustments) {
        net -= Number(adjustment.net_cleared || 0);
      }

      let balanceText = "0 sodas";
      let summary = "No one owes anything right now.";

      if (net > 0) {
        balanceText = `${players.playerB} → ${players.playerA}: ${net}`;
        summary = `${players.playerB} owes ${players.playerA} ${net} soda${net === 1 ? "" : "s"}`;
      } else if (net < 0) {
        balanceText = `${players.playerA} → ${players.playerB}: ${Math.abs(net)}`;
        summary = `${players.playerA} owes ${players.playerB} ${Math.abs(net)} soda${Math.abs(net) === 1 ? "" : "s"}`;
      }

      return { aWon, bWon, net, balanceText, summary };
    }

    function getHistoryItems() {
      const betItems = getSettledBets().map(bet => ({
        ...bet,
        historyType: "bet",
        historyDate: bet.settled_at
      }));

      const adjustmentItems = balanceAdjustments.map(adjustment => ({
        ...adjustment,
        historyType: "balance_reset",
        historyDate: adjustment.created_at
      }));

      return [...betItems, ...adjustmentItems].sort(
        (a, b) => new Date(b.historyDate).getTime() - new Date(a.historyDate).getTime()
      );
    }

    function updateChoiceDropdowns() {
      const teamA = document.getElementById("teamA").value.trim();
      const teamB = document.getElementById("teamB").value.trim();
      const madanChoice = document.getElementById("madanChoice");
      const paliChoice = document.getElementById("paliChoice");

      const currentMadan = madanChoice.value;
      const currentPali = paliChoice.value;

      madanChoice.innerHTML = '<option value="">Select team</option>';
      paliChoice.innerHTML = '<option value="">Select team</option>';

      [teamA, teamB].filter(Boolean).forEach(team => {
        const optionA = document.createElement("option");
        optionA.value = team;
        optionA.textContent = team;
        madanChoice.appendChild(optionA);

        const optionB = document.createElement("option");
        optionB.value = team;
        optionB.textContent = team;
        paliChoice.appendChild(optionB);
      });

      if ([teamA, teamB].includes(currentMadan)) madanChoice.value = currentMadan;
      if ([teamA, teamB].includes(currentPali)) paliChoice.value = currentPali;
    }

    function resetForm() {
      document.getElementById("match").value = "";
      document.getElementById("teamA").value = "";
      document.getElementById("teamB").value = "";
      document.getElementById("madanChoice").innerHTML = '<option value="">Select team</option>';
      document.getElementById("paliChoice").innerHTML = '<option value="">Select team</option>';
      document.getElementById("sodas").value = 1;
      hideError();
    }

    async function loadData() {
  setStatus("Loading shared data...");

  try {
    const { data: betsData, error: betsError } = await supabase
      .from("bets")
      .select("*")
      .order("created_at", { ascending: false });

    const { data: adjustmentsData, error: adjustmentsError } = await supabase
      .from("balance_adjustments")
      .select("*")
      .order("created_at", { ascending: false });

    if (betsError) {
      console.error("betsError:", betsError);
    }

    if (adjustmentsError) {
      console.error("adjustmentsError:", adjustmentsError);
    }

    bets = betsData || [];
    balanceAdjustments = adjustmentsData || [];

    render();

    if (betsError || adjustmentsError) {
      setStatus(
        "Connected, but one table failed: " +
        [
          betsError ? `bets: ${betsError.message}` : null,
          adjustmentsError ? `balance_adjustments: ${adjustmentsError.message}` : null
        ].filter(Boolean).join(" | ")
      );
    } else {
      setStatus("Shared app connected.");
    }
  } catch (err) {
    console.error("loadData crash:", err);
    setStatus("App crashed while loading: " + (err.message || "unknown error"));
    bets = [];
    balanceAdjustments = [];
    render();
  }
}

      bets = betsData || [];
      balanceAdjustments = adjustmentsData || [];
      setStatus("Shared app connected.");
      render();
    }

    async function createBet() {
      const match = document.getElementById("match").value.trim();
      const teamA = document.getElementById("teamA").value.trim();
      const teamB = document.getElementById("teamB").value.trim();
      const bettorAChoice = document.getElementById("madanChoice").value;
      const bettorBChoice = document.getElementById("paliChoice").value;
      const sodas = Number(document.getElementById("sodas").value);

      if (!teamA || !teamB || !bettorAChoice || !bettorBChoice) {
        showError("Please fill in all required fields.");
        return;
      }

      if (bettorAChoice === bettorBChoice) {
        showError("Each person must pick a different team.");
        return;
      }

      if (!sodas || sodas < 1) {
        showError("Sodas must be at least 1.");
        return;
      }

      hideError();
      setStatus("Creating bet...");

      const { error } = await supabase.from("bets").insert({
        match,
        team_a: teamA,
        team_b: teamB,
        bettor_a_choice: bettorAChoice,
        bettor_b_choice: bettorBChoice,
        sodas,
        status: "open"
      });

      if (error) {
        console.error(error);
        setStatus("Failed to create bet.");
        return;
      }

      resetForm();
      await loadData();
    }

    async function settleBet(betId, winningTeam) {
      const bet = bets.find(b => b.id === betId);
      if (!bet) return;

      let winner = null;
      if (bet.bettor_a_choice === winningTeam) winner = "playerA";
      if (bet.bettor_b_choice === winningTeam) winner = "playerB";

      setStatus("Settling bet...");

      const { error } = await supabase
        .from("bets")
        .update({
          status: "settled",
          winner,
          winning_team: winningTeam,
          settled_at: new Date().toISOString()
        })
        .eq("id", betId);

      if (error) {
        console.error(error);
        setStatus("Failed to settle bet.");
        return;
      }

      await loadData();
    }

    async function deleteBet(betId) {
      setStatus("Deleting bet...");

      const { error } = await supabase
        .from("bets")
        .delete()
        .eq("id", betId);

      if (error) {
        console.error(error);
        setStatus("Failed to delete bet.");
        return;
      }

      await loadData();
    }

    async function settleScore() {
      const scoreboard = getScoreboard();
      if (scoreboard.net === 0) return;

      const summary =
        scoreboard.net > 0
          ? `Balance settled: ${players.playerB} paid ${players.playerA} ${scoreboard.net} soda${scoreboard.net === 1 ? "" : "s"}`
          : `Balance settled: ${players.playerA} paid ${players.playerB} ${Math.abs(scoreboard.net)} soda${Math.abs(scoreboard.net) === 1 ? "" : "s"}`;

      setStatus("Recording balance settlement...");

      const { error } = await supabase.from("balance_adjustments").insert({
        net_cleared: scoreboard.net,
        summary
      });

      if (error) {
        console.error(error);
        setStatus("Failed to settle score.");
        return;
      }

      await loadData();
    }

    function renderDashboard() {
      const scoreboard = getScoreboard();
      document.getElementById("balanceText").textContent = scoreboard.balanceText;
      document.getElementById("balanceSummary").textContent = scoreboard.summary;
      document.getElementById("madanWon").textContent = scoreboard.aWon;
      document.getElementById("paliWon").textContent = scoreboard.bWon;
      document.getElementById("settleScoreBtn").disabled = scoreboard.net === 0;
    }

    function renderActiveBets() {
      const active = getActiveBets();
      const container = document.getElementById("activeTab");

      if (active.length === 0) {
        container.innerHTML = '<div class="empty">No active bets yet.</div>';
        return;
      }

      container.innerHTML = active.map(bet => `
        <div class="bet-item">
          <div class="bet-top">
            <div>
              <h4 class="bet-title">
                ${escapeHtml(bet.match || `${bet.team_a} vs ${bet.team_b}`)}
                <span class="badge">${bet.sodas} soda${bet.sodas === 1 ? "" : "s"}</span>
              </h4>
              <div class="bet-meta">
                <strong>${players.playerA}</strong> → ${escapeHtml(bet.bettor_a_choice)}
                &nbsp; | &nbsp;
                <strong>${players.playerB}</strong> → ${escapeHtml(bet.bettor_b_choice)}
              </div>
              <div class="bet-time">Created: ${formatDate(bet.created_at)}</div>
            </div>
            <button class="button ghost" onclick="deleteBet('${bet.id}')">Delete</button>
          </div>
          <div class="actions">
            <button class="button secondary" onclick="settleBet('${bet.id}', ${JSON.stringify(bet.team_a)})">${escapeHtml(bet.team_a)} won</button>
            <button class="button secondary" onclick="settleBet('${bet.id}', ${JSON.stringify(bet.team_b)})">${escapeHtml(bet.team_b)} won</button>
          </div>
        </div>
      `).join("");
    }

    function renderHistory() {
      const history = getHistoryItems();
      const container = document.getElementById("historyTab");

      if (history.length === 0) {
        container.innerHTML = '<div class="empty">No history yet.</div>';
        return;
      }

      container.innerHTML = history.map(item => {
        if (item.historyType === "balance_reset") {
          return `
            <div class="bet-item">
              <h4 class="bet-title">
                Score settled
                <span class="badge reset">Balance Reset</span>
              </h4>
              <div class="bet-meta">${escapeHtml(item.summary)}</div>
              <div class="bet-time">Recorded: ${formatDate(item.created_at)}</div>
            </div>
          `;
        }

        return `
          <div class="bet-item">
            <div class="bet-top">
              <div>
                <h4 class="bet-title">
                  ${escapeHtml(item.match || `${item.team_a} vs ${item.team_b}`)}
                  <span class="badge settled">Settled</span>
                </h4>
                <div class="bet-meta">Winner: <strong>${escapeHtml(item.winning_team)}</strong></div>
                <div class="bet-meta">
                  Bet result: <strong>${item.winner === "playerA" ? players.playerA : players.playerB}</strong>
                  won ${item.sodas} soda${item.sodas === 1 ? "" : "s"}
                </div>
                <div class="bet-time">Settled: ${formatDate(item.settled_at)}</div>
              </div>
              <button class="button ghost" onclick="deleteBet('${item.id}')">Delete</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function render() {
      renderDashboard();
      renderActiveBets();
      renderHistory();
    }

    function setTab(tab) {
      const activeTabBtn = document.getElementById("activeTabBtn");
      const historyTabBtn = document.getElementById("historyTabBtn");
      const activeTab = document.getElementById("activeTab");
      const historyTab = document.getElementById("historyTab");

      if (tab === "active") {
        activeTabBtn.classList.add("active");
        historyTabBtn.classList.remove("active");
        activeTab.style.display = "block";
        historyTab.style.display = "none";
      } else {
        historyTabBtn.classList.add("active");
        activeTabBtn.classList.remove("active");
        historyTab.style.display = "block";
        activeTab.style.display = "none";
      }
    }

    document.getElementById("teamA").addEventListener("input", updateChoiceDropdowns);
    document.getElementById("teamB").addEventListener("input", updateChoiceDropdowns);
    document.getElementById("createBetBtn").addEventListener("click", createBet);
    document.getElementById("settleScoreBtn").addEventListener("click", settleScore);
    document.getElementById("activeTabBtn").addEventListener("click", () => setTab("active"));
    document.getElementById("historyTabBtn").addEventListener("click", () => setTab("history"));

    loadData();
    setInterval(loadData, 4000);
  </script>
</body>
</html>
